name: Bug Report
description: Report a bug
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Code, commands, or steps to reproduce the issue. Without this, the issue will likely be closed.
      render: shell
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: Package/crate version you're using.
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: "OS, runtime version (e.g. Node 22, Rust 1.78), etc."
    validations:
      required: false
