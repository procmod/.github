name: Feature Request
description: Suggest a feature
labels: ["enhancement"]
body:
  - type: textarea
    id: what
    attributes:
      label: What do you want?
      description: A clear description of the feature.
    validations:
      required: true
  - type: textarea
    id: why
    attributes:
      label: Why does it belong here?
      description: Explain the use case and why this fits the scope of this project.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What are you currently doing instead? Are there other tools that do this?
    validations:
      required: false
